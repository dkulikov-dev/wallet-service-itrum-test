version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallet_db}
      POSTGRES_USER: ${POSTGRES_USER:-wallet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: wallet-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - postgres
      - app

  # ==================== Postgres Exporter ====================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: wallet-postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:latest
    container_name: wallet-grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  app:
    build: .
    container_name: wallet-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-wallet_db}
      POSTGRES_USER: ${POSTGRES_USER:-wallet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet_pass}
    ports:
      - "8080:8080"

volumes:
  postgres_data: